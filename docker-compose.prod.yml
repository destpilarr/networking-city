services:
  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: game_crypto
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data:/data

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: http://localhost
      NEXT_PUBLIC_COLYSEUS_URL: ws://localhost/ws
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/game_crypto
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_URL: http://localhost
      BETTER_AUTH_SECRET: replace-with-32-char-secret
    depends_on:
      - postgres
      - redis

  server-1:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/game_crypto
      REDIS_URL: redis://redis:6379
      COLYSEUS_PORT: 2567
      COLYSEUS_PUBLIC_ADDRESS: server-1:2567
    depends_on:
      - postgres
      - redis

  server-2:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/game_crypto
      REDIS_URL: redis://redis:6379
      COLYSEUS_PORT: 2568
      COLYSEUS_PUBLIC_ADDRESS: server-2:2568
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - server-1
      - server-2

volumes:
  postgres-data:
  redis-data:
